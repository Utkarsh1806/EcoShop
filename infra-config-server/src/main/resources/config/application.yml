# Shared config served by Config Server to all services
ecoshop:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-please-change-in-production-32bytes-min}
    ttl-seconds: 3600
    issuer: ecoshop
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
