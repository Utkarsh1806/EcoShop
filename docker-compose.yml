  seller-service:
    build: ./seller-service
    environment: *common-env
    ports: ["8114:8114"]
    depends_on: [postgres, kafka, redis, eureka, config-server]

  admin-service:
    build: ./admin-service
    environment: *common-env
    ports: ["8115:8115"]
