    ports: ["8104:8104"]
    depends_on: [postgres, kafka, redis, eureka, config-server]

  inventory-service:
    build: ./inventory-service
    environment: *common-env
    ports: ["8105:8105"]
    depends_on: [postgres, kafka, redis, eureka, config-server]

  cart-service:
