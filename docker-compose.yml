    environment: *common-env
    ports: ["8110:8110"]
    depends_on: [postgres, kafka, redis, eureka, config-server]

  pricing-promotion-service:
    build: ./pricing-promotion-service
    environment: *common-env
    ports: ["8111:8111"]
